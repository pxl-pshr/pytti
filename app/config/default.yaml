defaults:
  - _self_
  - conf: _empty

#############
## Prompts ##
#############

scenes: 'infinite fractal mushroom forest | bioluminescent mycelium network | Mandelbrot mushroom caps:2 | sacred geometry:1.5 | psilocybin:1.5'
scene_prefix: ''
scene_suffix: '| signature:-1.0:-.95 | signatures:-1.0:-.95 | text:-1.0:-.95'

direct_image_prompts: ''
init_image: ''
direct_init_weight: ''
semantic_init_weight: ''

##################################

image_model: Limited Palette
vqgan_model: coco
animation_mode: '3D'

##################################

width: 512
height: 512

steps_per_scene: 10000
steps_per_frame: 80
interpolation_steps: 250

learning_rate: null
reset_lr_each_frame: true
seed: ${now:%f}
cutouts: 50
cut_pow: 2.1
cutout_border: 0.25

border_mode: wrap

##################################

##########
# Camera #
##########

field_of_view: 60
near_plane: 2000
far_plane: 12500

#######################
### Audioreactivity ###
#######################

input_audio: ""
input_audio_offset: 0
input_audio_filters: []

pre_animation_steps: 50
lock_camera: true

translate_x: '22'
translate_y: '0'
translate_z_3d: '27'
rotate_3d: '[cos(radians(1)),-sin(radians(0.3)),0,sin(radians(0.1))]'
rotate_2d: '0'
zoom_x_2d: '0'
zoom_y_2d: '0'

sampling_mode: bicubic
infill_mode: wrap

##################################

pixel_size: 1
smoothing_weight: 1

#######################
### Limited Palette ###
#######################

random_initial_palette: false
palette_size: 50
palettes: 18
gamma: 1.5
hdr_weight: 0.35
palette_normalization_weight: 0.75
show_palette: false
target_palette: ''
lock_palette: false

##############
### ffmpeg ###
##############

frames_per_second: 15

direct_stabilization_weight: '1'
semantic_stabilization_weight: ''
depth_stabilization_weight: ''
edge_stabilization_weight: ''
flow_stabilization_weight: ''

#####################################
### animation_mode = Video Source ###
#####################################

video_path: ''
frame_stride: 1
reencode_each_frame: true
flow_long_term_samples: 1

############
### CLIP ###
############

ViTB32: true
ViTB16: true
ViTL14: false
ViTL14_336px: false
RN50: false
RN101: false
RN50x4: true
RN50x16: false
RN50x64: false

use_mmc: false

###############
### Outputs ###
###############

file_namespace: default
allow_overwrite: true
display_every: 50
clear_every: 0
display_scale: 1
save_every: 0

backups: 3
show_graphs: false
approximate_vram_usage: false
use_tensorboard: false

#################
### Model I/O ###
#################

models_parent_dir: ${user_cache:}

##########################
### Performance tuning ###
##########################

gradient_accumulation_steps: 2
device: 0
